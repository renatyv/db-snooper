[project]
name = "ai-sql-context"
version = "0.1.0"
description = "Generate compact SQL context files for LLM analytic query generation."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pymysql>=1.1.1",
    "sqlalchemy>=2.0.30",
]

[project.scripts]
ai-sql-context = "ai_sql_context.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
